stages:
  - build
  - publish

build:
  stage: build
  image: python:3.11
  script:
    - pip install flit
    - flit build
  artifacts:
    paths:
      - dist/

publish-pypi:
  stage: publish
  image: python:3.11
  script:
    - pip install flit
    - flit publish
  environment: pypi
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  variables:
    FLIT_USERNAME: __token__
    FLIT_PASSWORD: $PYPI_TOKEN
